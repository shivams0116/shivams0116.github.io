            <div class="hamburger">
                <span></span>

        </div>
    </nav>

    <main>
        <section class="contact">
            <div class="container">
                <h2 class="section-title">Get In Touch</h2>
                <div class="contact-content">
                    <div class="contact-info">
                        <div class="contact-item">
                            <span class="contact-icon">📧</span>
                            <span><a href="mailto:shivam.s0116@gmail.com">shivam.s0116@gmail.com</a></span>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📱</span>
                            <span>+91 70472 80653</span>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📍</span>
                            <span>Satna, 485001 (M.P.), India</span>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">🔗</span>
                            <span><a href="https://www.linkedin.com/in/shivam1939/" target="_blank">linkedin.com/in/shivam1939/</a></span>
                        </div>
                        <div class="social-links">
                            <!-- Optional: Add social links -->
                        </div>
                    </div>
                    <form class="contact-form">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
